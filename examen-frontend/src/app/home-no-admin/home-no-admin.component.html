<div class="container">
  <div class="header">
    <h2>Bienvenido</h2>
    <button class="btn-logout" (click)="logout()">Cerrar sesión</button>
  </div>

  <div class="info-card">
    <p><strong>Usuario:</strong> {{ nombreUsuario }}</p>
    <p><strong>Rol:</strong> {{ rolUsuario }}</p>
    <p class="mensaje">No tienes permisos para administrar roles o usuarios. Si necesitas acceso, contacta a un administrador.</p>
  </div>
</div>
