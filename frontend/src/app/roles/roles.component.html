<div class="container">
  <div class="header">
    <h2>Gestión de Roles</h2>
    <button class="btn-logout" (click)="logout()">Cerrar sesión</button>
  </div>

  <nav class="nav-links">
    <a routerLink="/roles">Roles</a>
    <a routerLink="/usuarios">Usuarios</a>
  </nav>

  <div class="error" *ngIf="error">{{ error }}</div>

  <form (ngSubmit)="onSubmit()" class="form-rol">
    <h3>{{ editando ? 'Editar Rol' : 'Nuevo Rol' }}</h3>

    <div class="form-group">
      <label>Nombre</label>
      <input type="text" name="nombre" [(ngModel)]="rolActual.nombre" required />
    </div>

    <div class="form-group">
      <label>Descripción</label>
      <input type="text" name="descripcion" [(ngModel)]="rolActual.descripcion" />
    </div>

    <button type="submit">{{ editando ? 'Actualizar' : 'Crear' }}</button>
    <button type="button" *ngIf="editando" (click)="cancelar()">Cancelar</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let rol of roles">
        <td>{{ rol.idRol }}</td>
        <td>{{ rol.nombre }}</td>
        <td>{{ rol.descripcion }}</td>
        <td>
          <button (click)="editar(rol)">Editar</button>
          <button (click)="eliminar(rol.idRol)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
